name: Bug Report
description: Report a defect, error, or unexpected behavior in the application.
title: "[Bug]: "
labels: ["bug"]

body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity / Priority
      description: How critical is this bug to the business or system stability?
      options:
        - Blocker (System down / Critical data loss)
        - Critical (Major feature broken, no workaround)
        - Major (Feature broken, workaround exists)
        - Minor (Cosmetic, UI glitch, or minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this bug occur?
      options:
        - Local Development
        - Dev / CI Environment
        - QA / Staging
        - Production
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of the stack is primarily affected? (Helps route to the right developer).
      options:
        - Frontend (UI / UX / State)
        - Backend (Java API / Services)
        - Database (Data integrity / Migrations)
        - Infrastructure / DevOps (Docker / CI-CD / Deployment)
        - Unknown / Needs Investigation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version / Browser / OS
      description: "e.g., v1.4.2, Chrome 115, Windows 11, iOS Safari"
      placeholder: "e.g., v2.1.0 / Chrome 120 / macOS Sonoma"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I click the 'Save' button on the user profile page, the application throws a 500 error and the data is not saved."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Detailed, numbered steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What *should* happen?
      placeholder: "The user profile should update successfully, and a green success toast should appear."
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What *actually* happened?
      placeholder: "The UI freezes, and a red error toast says 'Internal Server Error'."
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs, Screenshots, or Network Payloads
      description: |
        Please provide evidence to speed up debugging.
        - **Frontend:** Browser Console errors, Network tab (Request/Response payloads).
        - **Backend:** Java Stack traces, Spring Boot logs, or Kibana/Datadog links.
        - **Visual:** Screenshots or screen recordings of the UI issue.
      placeholder: "Paste stack traces, console logs, or drag and drop images here..."
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context / Possible Fix
      description: Add any other context, links, or ideas on how to fix the bug.
    validations:
      required: false